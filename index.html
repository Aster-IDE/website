<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsterIDE — A Simple Text Editor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="petals" id="petals"></div>
    
    <main>
        <div class="card">
            <div class="card-header">
                <div class="logo">
                    <svg viewBox="0 0 64 64" class="flower">
                        <g transform="translate(32,32)">
                            <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#ff82b4" transform="rotate(0)"/>
                            <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#ff9eb8" transform="rotate(72)"/>
                            <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#ffc8dc" transform="rotate(144)"/>
                            <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#ffb8d0" transform="rotate(216)"/>
                            <ellipse cx="0" cy="-12" rx="7" ry="10" fill="#ffa0c0" transform="rotate(288)"/>
                            <circle cx="0" cy="0" r="5" fill="#ffeaf5"/>
                        </g>
                    </svg>
                </div>
                <h1>AsterIDE</h1>
                <p class="tagline">A Simple Text Editor written in Rust.</p>
            </div>
            
            <div class="features">
                <div class="feature">
                    <i class="fas fa-feather"></i>
                    <span>Lightweight</span>
                </div>
                <div class="feature">
                    <i class="fas fa-bolt"></i>
                    <span>Fast</span>
                </div>
                <div class="feature">
                    <i class="fas fa-heart"></i>
                    <span>Made with Love :3</span>
                </div>
            </div>
            
            <a href="https://github.com/Aster-IDE/AsterIDE" target="_blank" class="cta">
                <i class="fab fa-github"></i>
                Source Code
            </a>
        </div>
    </main>
    
    <footer>
        <p>🌸 AsterIDE — Blooming Soon</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
